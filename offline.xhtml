<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
  "dtd/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en-AU" xml:lang="en-AU">
<head>
  <title>Offline | Nature's Infusions</title>
  <base href="https://naturesinfusions.com.au" />
  <meta http-equiv="Content-Type" content="application/xhtml+xml; charset=UTF-8" />
  <meta http-equiv="Content-Language" content="en-AU" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="You are offline. Nature's Infusions is a Perth-based Naturopath's passion project, offering high-quality organic teas for healthy living." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" type="text/css" href="assets/css/reset.css" />
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      color: #222;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .offline-container {
      max-width: 400px;
      margin: 2em auto;
      padding: 2em 1.5em;
      border-radius: 12px;
      background: #f8f8f8;
      box-shadow: 0 2px 8px rgba(76,175,80,0.08);
    }
    .offline-logo {
      margin-bottom: 1.5em;
    }
    h1 {
      color: #4CAF50;
      font-size: 2em;
      margin-bottom: 0.5em;
    }
    p {
      font-size: 1.1em;
      margin-bottom: 1.5em;
      color: #444;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75em 2em;
      font-size: 1em;
      color: #fff;
      background: #4CAF50;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .retry-btn:hover, .retry-btn:focus {
      background: #388e3c;
    }
    @media (max-width: 500px) {
      .offline-container {
        padding: 1em 0.5em;
      }
      h1 {
        font-size: 1.4em;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container" role="main" aria-labelledby="offline-title">
    <div class="offline-logo">
      <object data="assets/img/logo.svg" type="image/svg+xml" width="80" height="80" aria-label="Nature's Infusions Logo">
        <img src="assets/img/logo.svg" alt="Nature's Infusions Logo" width="80" height="80" />
      </object>
    </div>
    <h1 id="offline-title">You’re Offline</h1>
    <p>
      It looks like you’ve lost your internet connection.<br />
      Please check your connection and try again.<br />
      <small>(This is a special offline page from Nature’s Infusions.)</small>
    </p>
    <button class="retry-btn" onclick="window.location.reload(true)">Try Again</button>
  </div>
</body>
</html>
