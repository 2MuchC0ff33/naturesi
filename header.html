<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1111">
    <title>Nature's Infusions - Premium Herbal Products</title>
    <link rel="preload" href="/assets/img/logo.webp" as="image">
</head>
<body itemscope itemtype="https://schema.org/WebPage">
    <!-- Enhanced Header with Progressive Enhancement -->
    <header id="site-header" itemscope itemtype="https://schema.org/Organization" class="site-header">
        <div class="header-container">
            <!-- Mobile Menu Toggle (Hidden on Desktop) -->
            <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="primary-navigation">
                <span class="toggle-icon" aria-hidden="true"></span>
            </button>

            <!-- Logo with Lazy Loading -->
            <a href="/" class="logo-link" itemprop="url">
                <picture class="logo-picture" itemprop="logo">
                    <source srcset="/assets/img/logo.webp 1x, /assets/img/logo@2x.webp 2x" type="image/webp">
                    <source srcset="/assets/img/logo.png 1x, /assets/img/logo@2x.png 2x" type="image/png">
                    <img src="/assets/img/logo.webp" alt="Nature's Infusions Logo" loading="lazy" width="200" height="200" class="logo-img" decoding="async">
                </picture>
            </a>

            <!-- Delivery Location -->
            <div class="location-container">
                <button class="location-button" aria-label="Change delivery location">
                    <span class="location-icon" aria-hidden="true">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                        </svg>
                    </span>
                    <div class="location-text">
                        <span class="location-label">Deliver to</span>
                        <span class="location-value">Australia</span>
                    </div>
                </button>
            </div>

            <!-- Search Bar with Combobox Pattern -->
            <form role="search" class="search-form" aria-label="Site search">
                <div class="search-container">
                    <div class="search-category">
                        <select id="search-category" class="search-dropdown" aria-label="Search category">
                            <option value="all">All Categories</option>
                            <option value="wellness-blends">Wellness Blends</option>
                            <option value="herbal-infusions">Herbal Teas</option>
                            <option value="black-tea">Black Tea</option>
                            <option value="green-tea">Green Tea</option>
                        </select>
                        <span class="dropdown-icon" aria-hidden="true"></span>
                    </div>
                    <input type="search" id="search-input" class="search-input" placeholder="Search Nature's Infusions" aria-label="Search products">
                    <button type="submit" class="search-button" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 0 0 1.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 0 0-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 0 0 5.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                </div>
            </form>

            <!-- Account Navigation -->
            <nav class="account-nav" aria-label="Account navigation">
                <ul class="account-list">
                    <li class="account-item">
                        <button class="account-button" aria-expanded="false" aria-controls="language-dropdown">
                            <span class="flag-icon" aria-hidden="true">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                                </svg>
                            </span>
                            <span class="account-text">EN</span>
                        </button>
                    </li>
                    <li class="account-item">
                        <button class="account-button" aria-expanded="false" aria-controls="account-dropdown">
                            <span class="account-text">
                                <span class="account-label">Hello, sign in</span>
                                <span class="account-value">Account</span>
                            </span>
                        </button>
                    </li>
                    <li class="account-item">
                        <button class="account-button">
                            <span class="account-text">
                                <span class="account-label">Returns</span>
                                <span class="account-value">& Orders</span>
                            </span>
                        </button>
                    </li>
                    <li class="account-item">
                        <button class="account-button cart-button" aria-label="Shopping cart">
                            <span class="cart-icon" aria-hidden="true">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                                </svg>
                            </span>
                            <span class="cart-count" aria-live="polite">0</span>
                        </button>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- Secondary Navigation -->
        <nav class="secondary-nav" aria-label="Secondary navigation">
            <ul class="secondary-list">
                <li class="secondary-item">
                    <button class="secondary-button" aria-expanded="false" aria-controls="categories-menu">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                        </svg>
                        <span>All</span>
                    </button>
                </li>
                <li class="secondary-item"><a href="#" class="secondary-link">Today's Deals</a></li>
                <li class="secondary-item"><a href="#" class="secondary-link">Customer Service</a></li>
                <li class="secondary-item"><a href="#" class="secondary-link">Registry</a></li>
                <li class="secondary-item"><a href="#" class="secondary-link">Gift Cards</a></li>
                <li class="secondary-item"><a href="#" class="secondary-link">Wholesale</a></li>
            </ul>
        </nav>
    </header>
</body>
