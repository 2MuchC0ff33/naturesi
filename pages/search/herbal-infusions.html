<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" >
    <meta name="viewport" content=" width=device-width,initial-scale=1">
    <title>Search Results - Herbal Infusions</title>
    <link rel="stylesheet" href="/assets/css/main.css" >
    <link
      rel="search"
      type="application/opensearchdescription+xml"
      href="/opensearch.xml"
      title="Nature's Infusions"
    >
  </head>
  <body>
    <header>
      <a class="skip-link visually-hidden focusable" href="#main-content">Skip to main content</a>
      <h1>Search Results — Herbal Infusions</h1>
    </header>
    <main id="main-content">
      <form
        class="site-search"
        action="/pages/search.html"
        method="get"
        role="search"
        aria-label="Search site"
        data-debounce-ms="300"
      >
        <label for="search-category" class="visually-hidden">Select a category</label>
        <select id="search-category" name="category" class="category-select" aria-label="Product categories">
          <option value="">All categories</option>
          <option value="herbal-infusions">Herbal Infusions</option>
        </select>
        <!-- Replaced custom listbox with a native select element for semantics and accessibility (see HTML5 refactor checklist). -->
        <label for="site-search" class="visually-hidden">Search Nature's Infusions</label>
        <input
          id="site-search"
          name="q"
          type="search"
          placeholder="Search Nature's Infusions"
          class="search-box"
          aria-label="Search site"
        >
        <button class="search-icon" type="submit" aria-label="Submit search">Search</button>
      </form>
      <noscript
        ><p>
          No JavaScript: view category in the store
          <a href="/pages/store.html#herbal-infusions">Herbal Infusions</a>.
        </p></noscript
      >
      <section id="all-products"></section>
    </main>
    <footer><p>&copy; 2025 Nature's Infusions</p></footer>
    <!-- Consolidated scripts: removed duplicate <script> and extra IIFE start to fix unmatched tag error and ensure one IIFE executes (HTML5 refactor checklist). -->
    <script>
      (function () {
        try {
          const slug = 'herbal-infusions';
          const url = new URL(location.href);
          let category = url.searchParams.get('category');
          if (!category) {
            category = slug;
            url.searchParams.set('category', category);
            history.replaceState({}, '', url.toString());
          }
          // If the native select exists, set its value so the UI reflects the active category.
          const select = document.getElementById('search-category');
          if (select) {
            select.value = category;
          }
        } catch (e) {
          /* ignored: silent failure when updating history for older browsers */
        }
      })();
    </script>
    <!-- Added closing body to fix unclosed <body> element and satisfy HTML5 semantics (see HTML5 refactor checklist). -->
  </body>
</html>
