<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" >
    <meta name="viewport" content=" width=device-width,initial-scale=1">
    <title>Search Results - Ice Tea</title>
    <link rel="stylesheet" href="/assets/css/main.css" >
    <link
      rel="search"
      type="application/opensearchdescription+xml"
      href="/opensearch.xml"
      title="Nature's Infusions"
    >
  </head>
  <body>
    <header>
      <a class="skip-link visually-hidden focusable" href="#main-content">Skip to main content</a>
      <h1>Search Results — Ice Tea</h1>
    </header>
    <main id="main-content">
      <form
        class="site-search"
        action="/pages/search.html"
        method="get"
        role="search"
        aria-label="Search site"
        data-debounce-ms="300"
      >
        <label for="search-category" class="visually-hidden">Select a category</label>
        <div class="category-dropdown">
          <!-- Replaced the custom listbox with a native select for better accessibility and to ensure the form submits a 'category' value. -->
          <select id="search-category" name="category" aria-label="Product categories" class="category-select">
            <option value="">All categories</option>
            <option value="ice-tea" selected>Ice Tea</option>
          </select>
        </div>
        <label for="site-search" class="visually-hidden">Search Nature's Infusions</label>
        <input
          id="site-search"
          name="q"
          type="search"
          placeholder="Search Nature's Infusions"
          class="search-box"
          aria-label="Search site"
        >
        <button class="search-icon" type="submit" aria-label="Submit search">Search</button>
      </form>
      <noscript
        ><p>
          No JavaScript: view category in the store <a href="/pages/store.html#ice-tea">Ice Tea</a>.
        </p></noscript
      >
      <section id="all-products"></section>
    </main>
    <footer><p>&copy; 2025 Nature's Infusions</p></footer>
    <script>
      (function () {
        try {
          const slug = 'ice-tea';
          const url = new URL(location.href);
          if (!url.searchParams.has('category')) {
            url.searchParams.set('category', slug);
            history.replaceState({}, '', url.toString());
          }
        } catch (e) {
          /* ignored: silent failure when updating history for older browsers */
        }
      })();
    </script>
    <script type="module" src="/assets/js/app.js"></script>
  </body>
</html>
