<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Search Results - Artisan Blends</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="search" type="application/opensearchdescription+xml" href="/opensearch.xml" title="Nature's Infusions">
  </head>

  <body>
    <header>
      <a class="skip-link visually-hidden focusable" href="#main-content">Skip to main content</a>
      <h1>Search Results — Artisan Blends</h1>
    </header>
    <main id="main-content" role="main">
      <form
        class="site-search"
        action="/pages/search.html"
        method="get"
        role="search"
        aria-label="Search site"
        data-debounce-ms="300"
      >
        <label for="search-category" class="visually-hidden">Select a category</label>
        <input type="hidden" id="search-category" name="category" value="" />

        <nav aria-label="Product categories" class="category-dropdown">
          <details>
            <summary aria-haspopup="listbox" role="button">Select a category ▾</summary>
            <ul role="listbox" aria-label="Categories"></ul>
          </details>
        </nav>

        <label for="site-search" class="visually-hidden">Search Nature's Infusions</label>
        <input id="site-search" name="q" type="search" placeholder="Search Nature's Infusions" class="search-box" aria-label="Search site" />

        <button class="search-icon" type="submit" aria-label="Submit search">
          <!-- magnifier icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L20 21.49 21.49 20l-5.99-6zM4 9.5a5.5 5.5 0 1111 0 5.5 5.5 0 01-11 0z" fill="currentColor"/></svg>
        </button>
      </form>

      <p>Results for the Artisan Blends category will appear below. JavaScript will enrich this page with client-side search results using the bundled product index.</p>
      <noscript>
        <p>JavaScript is required for live search. You can view the canonical store section for this category: <a href="/pages/store.html#artisan-blends">Artisan Blends in the store</a>.</p>
      </noscript>

      <section id="all-products"></section>
    </main>
    <footer>
      <p>&copy; 2025 Nature's Infusions</p>
    </footer>
    <script>
      // Preselect this page's category in the URL so the client-side search hydrates with it.
      (function(){
        try {
          const slug = 'artisan-blends';
          const url = new URL(location.href);
          if (!url.searchParams.has('category')) {
            url.searchParams.set('category', slug);
            history.replaceState({}, '', url.toString());
          }
        } catch (e) { /* noop */ }
      })();
    </script>
    <script type="module" src="/assets/js/app.js"></script>
  </body>
</html>
