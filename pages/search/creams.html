<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" >
    <meta name="viewport" content=" width=device-width,initial-scale=1">
    <title>Search Results - Creams</title>
    <link rel="stylesheet" href="/assets/css/main.css" >
    <link
      rel="search"
      type="application/opensearchdescription+xml"
      href="/opensearch.xml"
      title="Nature's Infusions"
    >
  </head>
  <body>
    <header>
      <a class="skip-link visually-hidden focusable" href="#main-content">Skip to main content</a>
      <h1>Search Results — Creams</h1>
    </header>
    <main id="main-content">
      <form
        class="site-search"
        action="/pages/search.html"
        method="get"
        role="search"
        aria-label="Search site"
        data-debounce-ms="300"
      >
        <label for="search-category" class="visually-hidden">Select a category</label>
        <!-- Use native select for better semantics and keyboard support (replaces custom listbox) -->
        <select id="search-category" name="category" aria-label="Product categories" class="category-dropdown">
          <option value="">All categories</option>
          <option value="creams" selected>Creams</option>
        </select>
        <label for="site-search" class="visually-hidden">Search Nature's Infusions</label>
        <input
          id="site-search"
          name="q"
          type="search"
          placeholder="Search Nature's Infusions"
          class="search-box"
          aria-label="Search site"
        >
        <button class="search-icon" type="submit" aria-label="Submit search">Search</button>
      </form>
      <noscript
        ><p>
          No JavaScript: view category in the store <a href="/pages/store.html#creams">Creams</a>.
        </p></noscript
      >
      <section id="all-products"></section>
    </main>
    <footer><p>&copy; 2025 Nature's Infusions</p></footer>
    <!-- Removed duplicate <script> and merged the IIFE so the script tag is balanced and runs once (addresses JSX-like lint error) -->
    <script>
      (function () {
        try {
          const slug = 'creams';
          const url = new URL(location.href);
          if (!url.searchParams.has('category')) {
            url.searchParams.set('category', slug);
            history.replaceState({}, '', url.toString());
          }
          // Reflect the category value in the native select so the UI matches the URL
          var categorySelect = document.getElementById('search-category');
          if (categorySelect) {
            categorySelect.value = url.searchParams.get('category') || '';
          }
        } catch (e) {
          /* ignored: silent failure when updating history for older browsers */
        }
      })();
    </script>
    </body>
</html>
