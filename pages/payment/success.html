      <div class="nav-left">
        <a class="logo" href="/" aria-label="Nature's Infusions home">
          <img src="/assets/img/logo.svg" alt="Nature's Infusions logo" class="u-img-cover" />

      <div id="primary-nav-menu" class="nav-center" data-primary-nav>

              <circle cx="8.5" cy="17.5" r="1.25" fill="currentColor"></circle>
              <circle cx="17.5" cy="17.5" r="1.25" fill="currentColor"></circle>
            </svg>
