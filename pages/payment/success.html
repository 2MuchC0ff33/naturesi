<!doctype html>
<html lang="en-AU">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment success</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script type="module" src="/assets/js/app.js"></script>
  <script type="module">
    // Clear local cart used by static checkout flows
    try {
      if (typeof localStorage !== 'undefined') {
        localStorage.removeItem('naturesi_cart');
        localStorage.removeItem('naturesi-cart');
      }
    } catch (e) {
      console.warn('Failed to clear cart on payment success:', e);
    }
  </script>
</head>

<body>
  <main class="container">
    <h1>Payment completed</h1>
    <p>Thank you — your payment has been completed. If you need assistance, contact support.</p>
    <p><a href="/pages/store.html" class="btn">Continue shopping</a></p>
    <noscript>
      <div class="muted">
        <p>
          If you still see items in your cart after completing payment, your browser may be
          showing a saved cart. To clear your saved cart, please clear site data or cookies for
          this site in your browser settings, or
          <a href="/pages/contact.html">contact support</a> for help.
        </p>
      </div>
    </noscript>
  </main>
</body>

</html>
