<!doctype html>
<html lang="en-AU">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Checkout - Nature's Infusions | Premium Organic Teas &amp; Herbal Remedies</title>
  <meta name="description"
    content="Perth-based Naturopath's passion project offering certified organic teas and herbal infusions for holistic wellness. Australian-made since 2025." />
  <meta name="keywords"
    content="organic tea, herbal infusion, naturopath, Perth, wellness, detox, chamomile, peppermint, turmeric" />
  <meta name="author" content="Nature's Infusions" />
  <meta name="copyright" content="© 2025 Nature's Infusions" />
  <meta name="generator" content="Ultra-Simple StaticEStore Framework" />
  <base href="/" />

  <!-- SEO and Indexing -->
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="rating" content="general" />
  <link rel="canonical" href="https://www.naturesinfusions.com.au/pages/checkout.html" />
  <link rel="sitemap" href="/sitemap.xml" type="application/xml" title="Sitemap" />

  <!-- Social Media Meta -->
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.naturesinfusions.com.au/pages/checkout.html" />
  <meta property="og:title" content="Checkout - Nature's Infusions | Premium Organic Teas and Herbal Infusions" />
  <meta property="og:description" content="Secure checkout for Australian-made organic teas and herbal infusions" />
  <meta property="og:image" content="https://www.naturesinfusions.com.au/assets/img/social-share-og.webp" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Checkout - Nature's Infusions | Premium Organic Teas and Herbal Infusions" />
  <meta name="twitter:description" content="Secure checkout for Australian-made organic teas and herbal infusions" />
  <meta name="twitter:image" content="https://www.naturesinfusions.com.au/assets/img/social-share-og.webp" />

  <link rel="stylesheet" href="/assets/css/main.css" />
</head>

<body>
  <!-- WCAG: Skip link for keyboard users -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header id="site-header">
    <nav class="site-nav" aria-label="Site navigation" data-site-nav>
      <div class="nav-left">
        <a class="logo" href="/" aria-label="Nature's Infusions home">
          <img src="/assets/img/logo.svg" alt="Nature's Infusions logo" class="u-img-cover" />
        </a>
      </div>

      <!-- Improved nav-center: group search in a flex wrapper -->
      <div id="primary-nav-menu" class="nav-center" data-primary-nav>
        <div class="nav-center-flex center-row">
          <!-- Removed category select dropdown -->
          <!-- Inline comment: All JS removed for pure HTML5 search, OpenSearch compatible. -->
          <form id="site-search-form" class="site-search" action="/search.html" method="get" role="search"
            aria-label="Search site">
            <label for="site-search" class="visually-hidden">Search Nature's Infusions</label>
            <input id="site-search" name="q" type="search" placeholder="Search Nature's Infusions" class="search-box"
              aria-label="Search site" />
            <button class="search-icon btn btn--ghost" type="submit" aria-label="Submit search">
            </button>
          </form>
        </div>
      </div>

      <div class="nav-right" data-header-right>
        <a class="cart-option" href="/pages/cart.html" aria-label="Cart">
          <div class="cart-logo" aria-hidden="true">
            <!-- inline svg cart -->
            <svg width="20" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true" focusable="false">
              <!-- Simple cart shape (rectangle body + wheels) -->
              <rect x="3" y="4" width="14" height="10" rx="1" stroke="currentColor" stroke-width="1.25" fill="none">
              </rect>
              <path d="M7 4L6 2H3" stroke="currentColor" stroke-width="1.25" fill="none"></path>
              <circle cx="8.5" cy="17.5" r="1.25" fill="currentColor"></circle>
              <circle cx="17.5" cy="17.5" r="1.25" fill="currentColor"></circle>
            </svg>
          </div>
          <span class="cart-text">Cart</span>
          <output class="cart-count" name="cart-count" aria-live="polite">0</output>
        </a>
      </div>
    </nav>

    <!-- Categories nav: dynamic list will be populated by assets/js/modules/categories-nav.js -->
    <nav class="site-header__categories" aria-label="Product categories" role="navigation">
      <h2 class="sr-only">Product categories</h2>
      <ul class="site-header__categories-list" role="menubar" aria-hidden="true">
        <!-- JS will populate list items here. Minimal fallback item for no-JS. -->
        <li role="none"><a role="menuitem" class="site-header__categories-link" href="/pages/store.html">Show All</a>
        </li>
      </ul>
    </nav>
  </header>

  <main id="main-content" tabindex="-1" class="container">
    <h1>Checkout</h1>

    <section id="order-summary" aria-labelledby="summary-heading" data-checkout-summary>
      <h2 id="summary-heading">Order summary</h2>
      <div id="summary-content" aria-live="polite" data-checkout-summary-content></div>
      <p id="checkout-note" class="muted" data-checkout-note></p>
      <p id="checkout-error" class="error hidden" role="alert" data-checkout-error></p>
    </section>

    <section id="payment" aria-labelledby="payment-heading" data-checkout-payment>
      <h2 id="payment-heading">Payment</h2>
      <noscript>
        <p class="muted">
          No JavaScript required for product purchases — use the Buy Now buttons on product pages.
        </p>
      </noscript>
      <div id="paypal-button-container" aria-label="PayPal payment options" data-paypal-button></div>

      <!-- Simple PayPal Redirect form (minimal, HTML-first fallback).
           Uses PayPal Payments Standard POST redirect. Amount and item are populated by JS.
           SECURITY NOTE: Amounts set client-side can be tampered with — reconcile payments server-side or use IPN/PDT for verification. -->
      <form id="paypal-redirect-form" method="post" class="paypal-redirect" data-paypal-redirect-form
        action="https://www.sandbox.paypal.com/cgi-bin/webscr" aria-label="Proceed to PayPal">
        <input type="hidden" name="cmd" value="_xclick">
        <input type="hidden" name="business" value="">
        <input type="hidden" name="item_name" id="pp-item_name" data-paypal-item_name value="">
        <input type="hidden" name="amount" id="pp-amount" data-paypal-amount value="0.00">
        <input type="hidden" name="currency_code" value="AUD">
        <input type="hidden" name="return" value="/pages/payment/success.html">
        <input type="hidden" name="cancel_return" value="/pages/payment/fail.html">
        <input type="hidden" name="rm" value="2">
        <input type="hidden" name="notify_url" id="pp-notify" data-paypal-notify value="">
        <input type="hidden" name="invoice" id="pp-invoice" data-paypal-invoice value="">
        <button id="pay-now-redirect" type="submit" disabled data-pay-now>Proceed to PayPal (Redirect)</button>
      </form>
      <!-- Debug: shows populated form values when ?debug=1 is in URL or paypal.json.debug === true -->
      <div id="paypal-debug" class="muted visually-hidden font-mono small-text mt-sm" data-paypal-debug>Debug info
        hidden. Add
        ?debug=1 to the URL to view prepared PayPal form values.</div>
    </section>
  </main>

  <script type="module" src="/assets/js/app.js"></script>
  <!-- pricing-index and products-guard are bundled via /assets/js/app.js -->
  <script type="module" src="/assets/js/modules/checkout-bootstrap.js"></script>
</body>

</html>
