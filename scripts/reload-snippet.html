<script>
(function() {
  var last = null;
  setInterval(function() {
    fetch('/reload.txt?t=' + Date.now()).then(function(r) {
      if (r.ok) return r.text();
    }).then(function(t) {
      if (t && t !== last) {
        last = t;
        location.reload();
      }
    }).catch(function() {});
  }, 1000);
})();
</script>
