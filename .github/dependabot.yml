# NOTE: GitHub uses `.github/dependabot.yml` as the canonical dependabot configuration.
# On case-insensitive filesystems (Windows), creating a separate `DEPENDABOT.yml` is not possible.
# The file below is the active configuration. If you intended a second file named `DEPENDABOT.yml`,
# please be aware GitHub ignores case differences; this single file serves both purposes.

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
