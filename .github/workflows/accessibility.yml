name: Accessibility checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  pa11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start simple server
        run: |
          python -m http.server 8000 > server.log 2>&1 &
          sleep 2
      - name: Run pa11y on store page
        run: npx pa11y http://127.0.0.1:8000/pages/store.html --browser chrome --timeout 60000
