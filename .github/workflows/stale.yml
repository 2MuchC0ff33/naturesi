# Auto-stale workflow — marks issues and PRs as stale after inactivity and closes them after a follow-up period.
# Important: this workflow deliberately exempts issues/PRs that touch payments, products, or security.
# If a change touches `pages/store.html`, `products.json` or `/add-to-cart` behaviour, add the label
# `manual-review` or `payments` to ensure it is not auto-closed and that humans review it.

name: 'Stale issues and PRs'

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs / Close after grace period
        uses: actions/stale@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            If you still need help, please reply and we will re-open it.

            NOTE: Issues that touch payments, `products.json` or `pages/store.html` require manual
            review and should be labelled `manual-review` or `payments` — those are exempt from
            automatic closing.
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had
            recent activity. If you still want to get this merged, please update the PR.

            NOTE: PRs that modify payments-related files (`pages/store.html`, `products.json`)
            are exempt when labelled `manual-review` or `payments` and must be reviewed by the
            2MuchC0ff33 before merging.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,payments,manual-review'
          exempt-pr-labels: 'pinned,security,payments,manual-review'
          operations-per-run: 30
          only-labels: ''
