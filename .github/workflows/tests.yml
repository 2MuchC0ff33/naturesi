name: Test Suite (DISABLED by default — local testing preferred)

# This workflow is kept for historical or on-demand usage only. It will not run on push/pull requests.
# To run any of these jobs, use the Actions UI and trigger manually. We prefer local testing.
on:
  workflow_dispatch: {}

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Start static server
        run: npm run start:static &
      - name: Run unit tests + coverage
        run: npm run coverage
      - name: Type-check
        run: npm run typecheck
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  e2e-js-off:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [chromium-js-off, webkit-js-off]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Start static server
        run: npm run start:static &
      - name: Run JS-disabled E2E smoke suite
        run: npx playwright test --project=${{ matrix.project }} --grep @smoke --reporter=junit
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

  e2e-js-on:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Start static server
        run: npm run start:static &
      - name: Run JS-enabled E2E
        run: npx playwright test --project=${{ matrix.project }} --reporter=junit
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Start static server
        run: npm run start:static &
      - name: Run accessibility tests
        run: npm run test:a11y
      - name: Upload axe results
        uses: actions/upload-artifact@v4
        with:
          name: axe-results
          path: playwright-report

  perf-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Install Chromium for Lighthouse
        run: sudo apt-get update && sudo apt-get install -y chromium-browser
      - name: Start static server
        run: npm run start:static &
      - name: Run lighthouse smoke checks
        run: node ./scripts/lighthouse-smoke.js
      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: reports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high
      - name: Attempt local OWASP ZAP baseline (if installed locally)
        run: |
          set -e
          mkdir -p reports
          node ./scripts/run-zap-local.js || echo "ZAP not available. Install ZAP locally or run with --diagnose (see TESTING.md)."
      - name: Upload ZAP report (if present)
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/zap-baseline.html

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Run mutation tests (Stryker)
        run: npx stryker run
      - name: Upload Stryker report
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: reports/mutation || stryker-output || .stryker-tmp || report
