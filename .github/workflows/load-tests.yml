name: Load Tests (manual-only; local testing preferred)

# This is kept as an on-demand workflow. Running load tests is resource intensive — run locally instead.
on:
  workflow_dispatch: {}

jobs:
  k6-load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install k6 (docker)
        run: echo "Using k6 docker image"
      - name: Start static server
        run: npm run start:static &
      - name: Run k6 baseline scenario
        uses: loadimpact/k6-action@v0.6.0
        with:
          script: load/k6-baseline.js
      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-output || k6-report
