<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Test Checkout Harness</title>
  </head>
  <body>
    <pre id="test-output"></pre>
    <script type="module">
      (async () => {
        const sampleCart = [
          { id: 'sku-1', title: 'Chamomile', price: 9.95, qty: 2 },
          { id: 'sku-2', title: 'Eucalyptus', price: 6.5, qty: 1 },
        ];
        localStorage.setItem('naturesi_cart', JSON.stringify(sampleCart));
        const cfgResp = await fetch('/assets/js/data/paypal.json');
        const cfg = await cfgResp.json();
        const module = await import('/assets/js/modules/checkout.js');
        const { parseCartRaw, buildPayPalPayload } = module;
        const raw = localStorage.getItem('naturesi_cart');
        const cart = parseCartRaw(raw);
        const { payload, errors } = buildPayPalPayload(cfg, cart);
        document.getElementById('test-output').textContent = JSON.stringify({ payload, errors });
      })();
    </script>
  </body>
</html>
